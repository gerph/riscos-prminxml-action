name: "PRM-in-XML builder"
description: "Build PRM-in-XML documentation into HTML and optionally PDF."
author: Charles Ferguson

inputs:
  files:
    description: "Whitespace-separated list of PRM-in-XML files to read"
    required: true
  output:
    description: "Directory to write generated files to"
    required: true
  lint:
    description: "'yes' to lint and fail on errors, 'no' to skip linting, or 'quiet' to report lint errors without failing"
    required: false
    default: "yes"
  pdf-generator:
    description: "'prince' to generate PDFs with Prince XML, 'weasyprint' to generate PDFs with WeasyPrint, or 'no' to skip PDF generation"
    required: false
    default: "no"
  prince-version:
    description: "'default' for the default Prince XML version, or a version number"
    required: false
    default: "default"
  version:
    description: "'default' for the default PRM-in-XML version, 'local' to use an existing tool, or a version number"
    required: false
    default: "default"
  format:
    description: "PRM-in-XML output format"
    required: false
    default: "html5+xml"
  catalog:
    description: "PRM-in-XML catalog version"
    required: false
    default: "103"
  log-directory:
    description: "Directory for PRM-in-XML log files; empty omits -L"
    required: false
    default: ""
  create-contents:
    description: "PRM-in-XML parameter: 'yes' or 'no'; empty uses the tool default"
    required: false
    default: ""
  create-body:
    description: "PRM-in-XML parameter: 'yes' or 'no'; empty uses the tool default"
    required: false
    default: ""
  create-contents-target:
    description: "PRM-in-XML parameter: target name, 'yes', or 'no'; empty uses the tool default"
    required: false
    default: ""
  position-with-names:
    description: "PRM-in-XML parameter: 'yes' or 'no'; empty uses the tool default"
    required: false
    default: ""
  css-base:
    description: "PRM-in-XML parameter: style name or 'none'; empty uses the tool default"
    required: false
    default: ""
  css-variant:
    description: "PRM-in-XML parameter: style variant names, or 'none'; empty uses the tool default"
    required: false
    default: ""
  css-file:
    description: "PRM-in-XML parameter: relative stylesheet filename, or 'none'; empty uses the tool default"
    required: false
    default: ""
  override-chapter-number:
    description: "PRM-in-XML parameter: chapter number; empty uses the tool default"
    required: false
    default: ""
  override-docgroup:
    description: "PRM-in-XML parameter: document group name; empty uses the tool default"
    required: false
    default: ""
  override-docgroup-part:
    description: "PRM-in-XML parameter: document group part; empty uses the tool default"
    required: false
    default: ""
  edgeindex:
    description: "PRM-in-XML parameter: edge index number; empty uses the tool default"
    required: false
    default: ""
  edgeindex-max:
    description: "PRM-in-XML parameter: number of edge index spaces; empty uses the tool default"
    required: false
    default: ""
  front-matter:
    description: "PRM-in-XML parameter: front matter type, or 'no'; empty uses the tool default"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install PRM-in-XML prerequisites
      run: '"$GITHUB_ACTION_PATH/scripts/install-prminxml.sh"'
      shell: bash
      env:
        INPUT_PDF_GENERATOR: ${{ inputs.pdf-generator }}
        INPUT_PRINCE_VERSION: ${{ inputs.prince-version }}
        INPUT_VERSION: ${{ inputs.version }}

    - name: Build PRM-in-XML files
      run: '"$GITHUB_ACTION_PATH/scripts/build-prminxml.sh"'
      shell: bash
      env:
        INPUT_FILES: ${{ inputs.files }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_LINT: ${{ inputs.lint }}
        INPUT_PDF_GENERATOR: ${{ inputs.pdf-generator }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_CATALOG: ${{ inputs.catalog }}
        INPUT_LOG_DIRECTORY: ${{ inputs.log-directory }}
        INPUT_CREATE_CONTENTS: ${{ inputs.create-contents }}
        INPUT_CREATE_BODY: ${{ inputs.create-body }}
        INPUT_CREATE_CONTENTS_TARGET: ${{ inputs.create-contents-target }}
        INPUT_POSITION_WITH_NAMES: ${{ inputs.position-with-names }}
        INPUT_CSS_BASE: ${{ inputs.css-base }}
        INPUT_CSS_VARIANT: ${{ inputs.css-variant }}
        INPUT_CSS_FILE: ${{ inputs.css-file }}
        INPUT_OVERRIDE_CHAPTER_NUMBER: ${{ inputs.override-chapter-number }}
        INPUT_OVERRIDE_DOCGROUP: ${{ inputs.override-docgroup }}
        INPUT_OVERRIDE_DOCGROUP_PART: ${{ inputs.override-docgroup-part }}
        INPUT_EDGEINDEX: ${{ inputs.edgeindex }}
        INPUT_EDGEINDEX_MAX: ${{ inputs.edgeindex-max }}
        INPUT_FRONT_MATTER: ${{ inputs.front-matter }}

branding:
  icon: "book-open"
  color: "green"
