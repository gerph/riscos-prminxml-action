name: PRM-in-XML documentation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Build PRM-in-XML documentation
        uses: ./
        with:
          files: rtc.xml
          output: output/html

      - name: Upload generated documentation
        uses: actions/upload-artifact@v7
        with:
          name: prminxml-html
          path: output/html

      - name: Build PRM-in-XML documentation with Prince PDF
        uses: ./
        with:
          files: rtc.xml
          output: output/pdf
          pdf-generator: prince

      - name: Upload generated PDF documentation
        uses: actions/upload-artifact@v7
        with:
          name: prminxml-pdf
          path: output/pdf

      - name: Build modern PRM-in-XML documentation with Prince PDF
        uses: ./
        with:
          files: rtc.xml
          output: output/modern
          pdf-generator: prince
          style: prm-modern

      - name: Upload modern documentation
        uses: actions/upload-artifact@v7
        with:
          name: prminxml-modern
          path: output/modern

      - name: Build PRM-in-XML documentation with WeasyPrint PDF
        uses: ./
        with:
          files: rtc.xml
          output: output/weasyprint
          pdf-generator: weasyprint
          css-base: standard

      - name: Upload generated WeasyPrint documentation
        uses: actions/upload-artifact@v7
        with:
          name: prminxml-weasyprint
          path: output/weasyprint

      - name: Build indexed PRM-in-XML documentation
        uses: ./
        with:
          files: indexed/index.xml
          output: indexed/output
          format: index
          pdf-generator: prince
          log-directory: indexed/logs

      - name: Upload indexed documentation
        uses: actions/upload-artifact@v7
        with:
          name: prminxml-indexed
          path: indexed/output
